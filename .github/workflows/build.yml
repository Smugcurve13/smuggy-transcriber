name: Build apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to attach the build to a Release on tag push
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build SmuggyTranscriber.exe
        run: pyinstaller --onefile --windowed --name SmuggyTranscriber --icon assets/app.ico --add-data "assets;assets" app.py

      - name: Upload exe as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmuggyTranscriber-windows
          path: dist/SmuggyTranscriber.exe

      - name: Attach exe to Release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SmuggyTranscriber.exe

  macos:
    runs-on: macos-latest
    permissions:
      contents: write  # needed to attach the build to a Release on tag push
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build SmuggyTranscriber.app
        run: pyinstaller --onefile --windowed --name SmuggyTranscriber --icon assets/app.icns --add-data "assets:assets" app.py

      - name: Zip the .app bundle (ditto preserves the bundle structure)
        run: ditto -c -k --keepParent "dist/SmuggyTranscriber.app" SmuggyTranscriber-macos.zip

      - name: Upload app as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmuggyTranscriber-macos
          path: SmuggyTranscriber-macos.zip

      - name: Attach app to Release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SmuggyTranscriber-macos.zip
