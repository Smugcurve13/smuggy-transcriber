name: Build Windows exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to attach the exe to a Release on tag push
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Transcriber.exe
        run: pyinstaller --onefile --windowed --name Transcriber --add-data "assets;assets" app.py

      - name: Upload exe as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Transcriber
          path: dist/Transcriber.exe

      - name: Attach exe to Release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Transcriber.exe
